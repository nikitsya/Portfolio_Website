<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <link rel="icon" type="image/png" href="images/logo.png" />
    <link rel="apple-touch-icon" href="images/logo.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f3f7f1;
        color: #1f2d20;
      }

      a {
        color: #1f5d3a;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to <a id="home-link" href="/index.html">home page</a>...</p>
    <script>
      (function () {
        const path = window.location.pathname;
        const localProjectRoot = "/nikitsya/";
        const target = path.startsWith(localProjectRoot) ? `${localProjectRoot}index.html` : "/index.html";
        const link = document.getElementById("home-link");
        if (link) {
          link.href = target;
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
