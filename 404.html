<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f3f7f1;
        color: #1f2d20;
      }

      a {
        color: #1f5d3a;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to <a id="home-link" href="/">home page</a>...</p>
    <script>
      (function () {
        const segments = window.location.pathname.split("/").filter(Boolean);
        const isGitHubProjectSite = window.location.hostname.endsWith("github.io");
        const target = isGitHubProjectSite && segments.length > 0 ? `/${segments[0]}/` : "/";
        const link = document.getElementById("home-link");
        if (link) {
          link.href = target;
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
