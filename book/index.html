<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta content="noindex,nofollow" name="robots"/>
    <title>Книги - Nikita Smiichyk</title>
    <link href="../favicon.svg" rel="icon" type="image/svg+xml"/>
    <link href="../favicon.svg" rel="apple-touch-icon"/>
    <meta content="Книги Nikita Smiichyk: рукопись Дом без дверей и психологическая книга Природная секта." name="description"/>
    <style>
        :root {
            --paper: #eee4cf;
            --paper-soft: #fffaf1;
            --ink: #241b1a;
            --muted: #75695f;
            --wine: #743348;
            --wine-dark: #4b1f2d;
            --line: rgba(75, 31, 45, 0.22);
            --shadow: rgba(47, 31, 24, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: var(--paper);
            font-family: Georgia, "Times New Roman", serif;
            line-height: 1.55;
            letter-spacing: 0;
        }

        body::before {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            content: "";
            opacity: 0.42;
            background-image:
                linear-gradient(rgba(75, 31, 45, 0.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(75, 31, 45, 0.065) 1px, transparent 1px);
            background-size: 38px 38px;
        }

        a {
            color: inherit;
        }

        .books-home {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(16rem, clamp(18rem, 30vw, 25rem));
            align-items: center;
            gap: clamp(2.2rem, 6vw, 6.5rem);
            width: min(1180px, calc(100% - 2rem));
            min-height: 100svh;
            margin: 0 auto;
            padding: clamp(2.3rem, 5vw, 5.4rem) 0;
        }

        .home-copy {
            min-width: 0;
            animation: rise-in 850ms ease both;
        }

        h1 {
            max-width: 8ch;
            margin: 0;
            color: var(--wine);
            font-size: clamp(5rem, 13vw, 10rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .subtitle {
            max-width: 37rem;
            margin: 1.7rem 0 0;
            color: var(--ink);
            font-size: clamp(1.22rem, 2vw, 1.85rem);
            line-height: 1.3;
        }

        .intro {
            max-width: 39rem;
            margin: 1.3rem 0 0;
            color: var(--muted);
            font-size: clamp(1rem, 1.35vw, 1.16rem);
        }

        .book-links {
            display: grid;
            gap: 0.9rem;
            max-width: 42rem;
            margin-top: 2.2rem;
        }

        .book-link {
            --arrow-size: 2.2rem;
            --button-height: 4.8rem;
            position: relative;
            display: block;
            min-height: var(--button-height);
            padding: 0.95rem calc(var(--button-height) + 0.85rem) 0.95rem 1.15rem;
            border: 1px solid var(--wine);
            border-radius: 999px;
            background: var(--wine);
            color: #fffaf1;
            text-decoration: none;
            box-shadow: 0 1rem 2rem rgba(47, 31, 24, 0.12);
            transition: transform 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
        }

        .book-link.secondary {
            background: transparent;
            color: var(--wine-dark);
            box-shadow: none;
        }

        .book-link strong,
        .book-link span {
            display: block;
        }

        .book-link strong {
            font-size: clamp(1.15rem, 1.9vw, 1.5rem);
            line-height: 1.1;
        }

        .book-link strong + span {
            margin-top: 0.25rem;
            color: inherit;
            opacity: 0.76;
            font-size: 0.95rem;
        }

        .book-link .arrow {
            position: absolute;
            top: 50%;
            right: calc((var(--button-height) - var(--arrow-size)) / 2);
            width: var(--arrow-size);
            height: var(--arrow-size);
            border: 1px solid currentColor;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            line-height: 1;
            margin-top: 0;
            transform: translateY(-50%);
        }

        .book-link:hover,
        .book-link:focus-visible {
            transform: translateY(-3px);
            background: var(--wine-dark);
            color: #fffaf1;
            outline: none;
            box-shadow: 0 1.15rem 2.2rem rgba(47, 31, 24, 0.17);
        }

        .cover-stack {
            position: relative;
            min-height: clamp(25rem, 43vw, 35rem);
            animation: covers-in 1000ms 120ms ease both;
        }

        .cover-stack img {
            position: absolute;
            width: min(72%, 19rem);
            height: auto;
            border-radius: 2px 12px 12px 2px;
            object-fit: contain;
            box-shadow:
                0 1.15rem 2.2rem var(--shadow),
                -8px 0 0 rgba(75, 31, 45, 0.88);
            transition: transform 360ms ease, box-shadow 360ms ease;
        }

        .cover-stack img:first-child {
            top: 0;
            right: 12%;
            z-index: 2;
            transform: rotateY(-8deg) rotateZ(1deg);
        }

        .cover-stack img:last-child {
            right: 0;
            bottom: 0;
            z-index: 1;
            transform: translateX(-26%) rotateY(-4deg) rotateZ(-4deg);
        }

        .cover-stack:hover img:first-child {
            transform: translateY(-0.45rem) rotateY(-3deg) rotateZ(0deg);
        }

        .cover-stack:hover img:last-child {
            transform: translateX(-22%) translateY(0.25rem) rotateY(-2deg) rotateZ(-2deg);
        }

        @keyframes rise-in {
            from {
                opacity: 0;
                transform: translateY(1.4rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes covers-in {
            from {
                opacity: 0;
                transform: translateY(2rem) rotateZ(-1deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateZ(0);
            }
        }

        @media (max-width: 840px) {
            .books-home {
                grid-template-columns: 1fr;
                min-height: auto;
                padding: 3.2rem 0 4rem;
            }

            h1 {
                font-size: clamp(4rem, 18vw, 7rem);
            }

            .cover-stack {
                min-height: 24rem;
                width: min(100%, 28rem);
            }

            .cover-stack img {
                width: min(62%, 17rem);
            }
        }

        @media (max-width: 520px) {
            .books-home {
                width: min(100% - 1.2rem, 1180px);
            }

            .book-link {
                border-radius: 28px;
                padding-right: calc(var(--button-height) + 0.35rem);
            }

            .cover-stack {
                min-height: 21rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
<main class="books-home">
    <section class="home-copy" aria-label="Книги">
        <h1>Книги</h1>
        <p class="subtitle">Две книги о памяти, семейной системе и возвращении права быть собой.</p>
        <p class="intro">Выберите, с чего начать: с личной рукописи или психологической книги.</p>

        <nav class="book-links" aria-label="Выбор книги">
            <a class="book-link" href="dom-bez-dverey/">
                <span>
                    <strong>Дом без дверей</strong>
                    <span>рукопись</span>
                </span>
                <span class="arrow" aria-hidden="true">→</span>
            </a>
            <a class="book-link secondary" href="prirodnaya-sekta/">
                <span>
                    <strong>Природная секта</strong>
                    <span>психологическая книга</span>
                </span>
                <span class="arrow" aria-hidden="true">→</span>
            </a>
        </nav>
    </section>

    <div class="cover-stack" aria-hidden="true">
        <img src="assets/img/dom-bez-dverey-cover.png" alt=""/>
        <img src="assets/img/prirodnaya-sekta.png" alt=""/>
    </div>
</main>
</body>
</html>
